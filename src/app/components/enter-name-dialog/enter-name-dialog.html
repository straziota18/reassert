<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  <mat-form-field appearance="outline" class="input-form-field full-width">
    <mat-label>Name</mat-label>
    <input
      matInput
      [placeholder]="data.placeholder ?? 'Enter a name'"
      [ngModel]="name()"
      (ngModelChange)="name.set($event)"
      (keydown.enter)="confirm()"
      autofocus
    />
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" [disabled]="!name().trim()" (click)="confirm()">OK</button>
</mat-dialog-actions>
