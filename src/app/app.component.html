<mat-sidenav-container class="app-container" fullscreen>

  <!-- ─── Sidenav ─────────────────────────────────────────── -->
  <mat-sidenav #sidenav [mode]="sidenavMode" [opened]="sidenavOpened" class="app-sidenav">
    <!-- Logo / App name -->
    <div class="sidenav-header">
      <mat-icon class="sidenav-logo">precision_manufacturing</mat-icon>
      <span class="sidenav-title">{{ title() }}</span>
    </div>

    <mat-divider></mat-divider>

    <!-- Navigation items -->
    <mat-nav-list>
      @for (item of navItems; track item.route) {
      <a mat-list-item [routerLink]="item.route"
        [class.active-nav-item]="isActive(item.route)">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
      }

    </mat-nav-list>

    <!-- Dark mode toggle pinned to bottom -->
    <div class="sidenav-footer">
      <mat-divider></mat-divider>
      <div class="dark-mode-row">
        <mat-icon>{{ isDarkMode ? 'dark_mode' : 'light_mode' }}</mat-icon>
        <span>Dark mode</span>
        <mat-slide-toggle [checked]="isDarkMode" (change)="toggleDarkMode()" color="primary"></mat-slide-toggle>
      </div>
    </div>
  </mat-sidenav>

  <!-- ─── Main content ─────────────────────────────────────── -->
  <mat-sidenav-content style="display: flex; flex-direction: column;">

    <!-- Top toolbar -->
    <mat-toolbar color="primary" class="app-toolbar">
      <button mat-icon-button (click)="toggleSidenav()" aria-label="Toggle navigation menu">
        <mat-icon>menu</mat-icon>
      </button>

      <span class="toolbar-title">{{ title() }}</span>
      <span class="toolbar-spacer"></span>

      <!-- Dark mode toggle (mobile — also shown in toolbar) -->
      @if (isMobile) {
      <button mat-icon-button (click)="toggleDarkMode()"
        [attr.aria-label]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'">
        <mat-icon>{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
      }

    </mat-toolbar>

    <!-- Routed views -->
    <div class="app-content">
      <router-outlet></router-outlet>
    </div>

  </mat-sidenav-content>

</mat-sidenav-container>
